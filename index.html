<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ตรวจสอบข้อมูลคอร์ส — ARTNOLATE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── Tokens ดีไซน์เดิมของคุณ Pop ─────────────────────────────── */
:root{
  --primary:#1C2951;
  --accent:#FF8C00;
  --accent-light:#FFE5CC;
  --bg:#F5F7FA;
  --surface:#fff;
  --border:#DDE4ED;
  --border-light:#EEF1F6;
  --txt:#1A1D23;
  --txt2:#6B7280;
  --txt3:#9CA3AF;
  --green:#10B981;
  --green-l:#D1FAE5;
  --orange:#F59E0B;
  --orange-l:#FEF3C7;
  --red:#EF4444;
  --red-l:#FEE2E2;
  --grey:#9CA3AF;
  --grey-l:#F3F4F6;
  --r:14px;
  --shadow:0 4px 20px rgba(28,41,81,0.04);
  --transition:all 0.2s ease;
}

*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body{ font-family:'Sarabun', sans-serif; background:var(--bg); color:var(--txt); display:flex; flex-direction:column; min-h:100vh; justify-content:center; align-items:center; padding:16px; }

.app-container{ w:100%; max-width:440px; margin:auto; display:flex; flex-direction:column; gap:16px; position:relative; }
.header{ text-align:center; padding:8px 0; }
.header h1{ font-size:26px; font-weight:700; color:var(--primary); tracking:1px; }
.header p{ font-size:11px; color:var(--txt3); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }

/* ── คาร์ดโครงสร้างเดิม ──────────────────────────────── */
.card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:24px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:20px; transition:var(--transition); }
.card-title{ font-size:16px; font-weight:600; color:var(--primary); display:flex; align-items:center; justify-content:between; }

/* ── หน้าต่าง Login เดิม ──────────────────────────────── */
#screen-login{ display:flex; justify-content:center; }
.login-box{ w:100%; text-align:center; gap:16px; }
.input-group{ text-align:left; display:flex; flex-direction:column; gap:6px; w:100%; }
.input-group label{ font-size:13px; font-weight:500; color:var(--txt2); }
.input-group input{ width:100%; padding:14px 16px; border:1px solid var(--border); border-radius:10px; font-family:inherit; font-size:16px; outline:none; transition:var(--transition); background:var(--bg); }
.input-group input:focus{ border-color:var(--primary); background:#fff; box-shadow:0 0 0 3px rgba(28,41,81,0.06); }

.btn{ width:100%; padding:14px; border:none; border-radius:10px; font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; transition:var(--transition); display:inline-flex; align-items:center; justify-content:center; gap:8px; text-decoration:none; }
.btn-primary{ background:var(--primary); color:#fff; }
.btn-primary:hover{ background:#131D3B; transform:translateY(-1px); }
.btn-primary:active{ transform:translateY(0); }
.btn-primary:disabled{ background:var(--grey); cursor:not-allowed; transform:none; }

.err-msg{ background:var(--red-l); color:var(--red); padding:12px 14px; border-radius:10px; font-size:13px; text-align:left; display:none; border:1px solid rgba(239,68,68,0.1); font-weight:500; }
.err-msg.show{ display:block; }

/* ── หน้าแดชบอร์ดหลักเดิม ────────────────────────────── */
#screen-main{ display:none; flex-direction:column; gap:14px; width:100%; }
.profile-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.profile-item{ display:flex; flex-direction:column; gap:4px; background:var(--bg); padding:12px 14px; border-radius:10px; border:1px solid var(--border-light); }
.profile-item.full{ grid-column:span 2; }
.p-lbl{ font-size:11px; color:var(--txt3); font-weight:500; }
.p-val{ font-size:14px; font-weight:600; color:var(--txt); }
.p-val.highlight{ font-size:18px; color:var(--primary); font-weight:700; }

/* ── ส่วนอำนวยความสะดวก: ประวัติและสไตล์พิลส์ ────────────────── */
.badge-status { font-size:11px; padding:4px 10px; border-radius:20px; font-weight:600; }
.status-active { background:var(--green-l); color:var(--green); }
.status-inactive { background:var(--grey-l); color:var(--txt2); }

.log-container{ max-height:220px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding-right:4px; }
.log-row{ display:flex; justify-content:space-between; align-items:center; background:var(--bg); border:1px solid var(--border-light); padding:10px 14px; border-radius:10px; font-size:13px; }
.log-meta{ display:flex; flex-direction:column; gap:2px; }
.log-date{ font-weight:600; color:var(--txt); }
.log-round{ font-size:11px; color:var(--txt3); }
.pill{ padding:4px 10px; border-radius:8px; font-size:11px; font-weight:600; text-align:center; min-width:70px; }
.pill-live{ background:var(--accent-light); color:var(--accent); }
.pill-online{ background:var(--border); color:var(--primary); }

/* ── กล่องบิลและระบบแจ้งเตือนแบบกลมกลืนดีไซน์เดิม ──────────── */
.alert-box { padding:12px 14px; border-radius:10px; font-size:13px; font-weight:500; line-height:1.5; border-left:4px solid; }
.alert-warning { background:var(--orange-l); color:#B45309; border-left-color:var(--orange); }
.alert-danger { background:var(--red-l); color:var(--red); border-left-color:var(--red); }

.billing-card { background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:16px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:10px; border-top:4px solid var(--red); }
.bill-item { display:flex; justify-content:space-between; font-size:13px; color:var(--txt2); padding:4px 0; border-bottom:1px dashed var(--border-light); }
.bill-total { display:flex; justify-content:space-between; align-items:center; font-weight:700; font-size:15px; color:var(--txt); padding-top:6px; }

.action-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
.btn-line { background:#06C755; color:#fff; }
.btn-line:hover { background:#05b34c; }
.btn-secondary { background:#fff; border:1px solid var(--border); color:var(--txt2); }
.btn-secondary:hover { background:var(--bg); }

.btn-logout{ font-size:13px; color:var(--txt3); text-align:center; cursor:pointer; background:none; border:none; margin-top:6px; font-family:inherit; text-decoration:underline; display:none; }
.btn-logout.show{ display:block; }
.loading { opacity:0.6; pointer-events:none; }
</style>
</head>
<body>

<div class="app-container">
  
  <div class="header">
    <h1>ARTNOLATE</h1>
    <p>Student Course Checker</p>
  </div>

  <div id="screen-login" class="card">
    <div class="login-box">
      <div class="input-group" style="margin-bottom:16px;">
        <label for="login-phone">ระบุเบอร์โทรศัพท์ผู้เรียน</label>
        <input type="tel" id="login-phone" placeholder="เช่น 0812345678" onkeypress="if(event.key==='Enter')performCheck()"/>
      </div>
      <button id="btn-search" class="btn btn-primary" onclick="performCheck()">ค้นหาข้อมูล</button>
      <div id="login-err" class="err-msg" style="margin-top:12px;"></div>
    </div>
  </div>

  <div id="screen-main">
    
    <div id="alert-zone" class="display:flex; flex-direction:column; gap:10px;"></div>

    <div id="billing-zone"></div>

    <div class="card">
      <div class="card-title">
        <span>ข้อมูลคอร์สเรียน</span>
        <span id="prof-status" class="badge-status"></span>
      </div>
      
      <div class="profile-grid">
        <div class="profile-item full">
          <span class="p-lbl">ชื่อ - นามสกุล</span>
          <span id="prof-fullname" class="p-val">—</span>
        </div>
        <div class="profile-item">
          <span class="p-lbl">ชื่อเล่น</span>
          <span id="prof-nickname" class="p-val">—</span>
        </div>
        <div class="profile-item">
          <span class="p-lbl">โรงเรียน</span>
          <span id="prof-school" class="p-val">—</span>
        </div>
        <div class="profile-item full">
          <span class="p-lbl">ภาควิชาที่ต้องการสอบเข้า</span>
          <span id="prof-dept" class="p-val">—</span>
        </div>
        <div class="profile-item full">
          <span class="p-lbl">คอร์สที่สมัครเรียน</span>
          <span id="prof-course" class="p-val">—</span>
        </div>
        <div class="profile-item">
          <span class="p-lbl">รอบคอร์สที่</span>
          <span id="prof-round" class="p-val">—</span>
        </div>
        <div class="profile-item">
          <span class="p-lbl">วันหมดอายุคอร์ส</span>
          <span id="prof-expiry" class="p-val">—</span>
        </div>
        <div class="profile-item full" style="background:var(--accent-light); border-color:rgba(255,140,0,0.15);">
          <span class="p-lbl" style="color:var(--accent); font-weight:600;">จำนวนสิทธิ์คงเหลือ</span>
          <span id="prof-remain" class="p-val highlight" style="color:var(--primary);">—</span>
        </div>
      </div>
    </div>

    <div class="action-row">
      <a href="https://lin.ee/UPPwbeT" target="_blank" class="btn btn-line">🟢 ติดต่อต่อคอร์ส</a>
      <a href="https://artnolate.github.io/art-link/" target="_blank" class="btn btn-secondary">🔎 ดูคอร์สอื่นเพิ่มเติม</a>
    </div>

    <div class="card">
      <div class="card-title">ประวัติการเช็คชื่อเข้าเรียน</div>
      <div id="att-list" class="log-container">
        </div>
    </div>

    <button id="btn-logout" class="btn-logout" onclick="logout()">ค้นหาเบอร์อื่น</button>
  </div>

</div>

<script>
// ** ระบุ URL ของ Web App ที่ทำการ Deploy จาก Google Apps Script **
const API_URL = "https://script.google.com/macros/s/AKfycbw6_JEBX8IJ9YU-EGXjARP6KZkCdjKa9Kfkw_O1yj_T8Su9xpVaUZrUL3wsj2HlUWK9/exec"; 

// ฟังก์ชันห่อหุ้มความปลอดภัยเพื่อป้องกันการเกิด textContent of null 
function updateTextSafe(id, value) {
  const element = document.getElementById(id);
  if (element) {
    element.textContent = value || '—';
  }
}

async function performCheck() {
  const phoneInput = document.getElementById('login-phone');
  const errBox = document.getElementById('login-err');
  const searchBtn = document.getElementById('btn-search');
  
  if (!phoneInput) return;
  const phone = phoneInput.value.trim();
  
  if (!phone) {
    if (errBox) {
      errBox.textContent = "⚠️ กรุณาระบุเบอร์โทรศัพท์ก่อนกดค้นหา";
      errBox.classList.add('show');
    }
    return;
  }
  
  // แสดงสถานะ Loading รอนิ่งๆ สไตล์เดิม
  if (errBox) errBox.classList.remove('show');
  if (searchBtn) {
    searchBtn.disabled = true;
    searchBtn.textContent = "กำลังค้นหา...";
  }

  try {
    const response = await fetch(`${API_URL}?action=studentCheck&phone=${encodeURIComponent(phone)}`);
    const result = await response.json();
    
    // คืนค่าปุ่มค้นหาเดิม
    if (searchBtn) {
      searchBtn.disabled = false;
      searchBtn.textContent = "ค้นหาข้อมูล";
    }

    if (!result.success) {
      if (errBox) {
        errBox.textContent = "❌ " + (result.message || "ไม่พบข้อมูลในระบบ");
        errBox.classList.add('show');
      }
      return;
    }

    // เรนเดอร์ข้อมูลทั้งหมดผ่านเซฟตี้ฟังก์ชัน
    renderProfileCard(result.profile);
    renderAlertBanners(result.profile);
    renderBillingInvoice(result.overLimitSummary);
    renderHistoryLog(result.history);

    // สลับหน้าจอแบบนุ่มนวลดีไซน์เดิม
    document.getElementById('screen-login').style.display = 'none';
    const mainScreen = document.getElementById('screen-main');
    if (mainScreen) mainScreen.style.display = 'flex';
    
    const logoutBtn = document.getElementById('btn-logout');
    if (logoutBtn) logoutBtn.classList.add('show');

  } catch (err) {
    if (searchBtn) {
      searchBtn.disabled = false;
      searchBtn.textContent = "ค้นหาข้อมูล";
    }
    if (errBox) {
      errBox.textContent = "💥 เกิดข้อผิดพลาดในการเชื่อมต่อกรุณาลองใหม่อีกครั้ง";
      errBox.classList.add('show');
    }
    console.error(err);
  }
}

function renderProfileCard(p) {
  updateTextSafe('prof-fullname', p.fullname);
  updateTextSafe('prof-nickname', p.nickname);
  updateTextSafe('prof-school', p.school);
  updateTextSafe('prof-dept', p.dept);
  updateTextSafe('prof-course', p.courseRaw);
  updateTextSafe('prof-round', p.round);
  updateTextSafe('prof-expiry', p.expiry ? fmtDateTH(p.expiry) : 'ไม่ระบุ');
  updateTextSafe('prof-remain', p.remaining + ' ครั้ง');

  // ตกแต่ง Badge สถานะตรงหัวคาร์ด
  const badge = document.getElementById('prof-status');
  if (badge) {
    badge.innerHTML = ''; // เคลียร์คลาสเดิมออก
    if (p.status && p.status.toLowerCase() === 'active') {
      badge.textContent = 'Active (ปกติ)';
      badge.className = 'badge-status status-active';
    } else {
      badge.textContent = 'InActive (คอร์สเก่า)';
      badge.className = 'badge-status status-inactive';
    }
  }
}

function renderAlertBanners(p) {
  const zone = document.getElementById('alert-zone');
  if (!zone) return;
  zone.innerHTML = ''; // ล้างแบนเนอร์เก่า

  const today = new Date();
  today.setHours(0,0,0,0);

  // [กฎสเต็ปที่ 1]: สิทธิ์เหลือ 0 - 2 ครั้ง
  const remains = parseInt(p.remaining);
  if (!isNaN(remains) && remains >= 0 && remains <= 2) {
    const box = document.createElement('div');
    box.className = 'alert-box alert-warning';
    box.innerHTML = `⚠️ <strong>จำนวนครั้งใกล้หมด:</strong> สิทธิ์เข้าเรียนคงเหลือในคอร์สมีจำนวนน้อย (เหลือ <strong>${remains} ครั้ง</strong>) อย่าลืมติดต่อแอดมินเพื่อดำเนินการต่อรอบคอร์สนะครับ`;
    zone.appendChild(box);
  }

  // [กฎสเต็ปที่ 2 และ 3]: ตรวจจับวันหมดอายุของคอร์สเรียน
  if (p.expiry) {
    const exp = new Date(p.expiry);
    exp.setHours(0,0,0,0);
    
    const diffTime = exp.getTime() - today.getTime();
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    if (diffDays < 0) {
      // หมดอายุไปเรียบร้อยแล้ว
      const box = document.createElement('div');
      box.className = 'alert-box alert-danger';
      box.innerHTML = `🚫 <strong>สิ้นสุดอายุการใช้งาน:</strong> คอร์สเรียนสิทธิ์หลักหมดอายุแล้วเมื่อวันที่ ${fmtDateTH(p.expiry)} การเช็คชื่อเข้าใช้งานหลังจากวันนี้จะมีค่าบริการเรียนเกินคำนวณแยกส่วนตัวครับ`;
      zone.appendChild(box);
      
      const expTxt = document.getElementById('prof-expiry');
      if (expTxt) expTxt.style.color = 'var(--red)';
    } else if (diffDays <= 7) {
      // กำลังจะหมดอายุภายใน 7 วัน
      const box = document.createElement('div');
      box.className = 'alert-box alert-warning';
      box.innerHTML = `⏳ <strong>คอร์สกำลังจะหมดอายุ:</strong> คอร์สนี้จะสิ้นสุดอายุใช้งานภายในวันที่ ${fmtDateTH(p.expiry)} (เหลือเวลาอีก <strong>${diffDays === 0 ? 'วันนี้วันสุดท้าย' : diffDays + ' วัน'}</strong>)`;
      zone.appendChild(box);
    }
  }
}

function renderBillingInvoice(summary) {
  const bZone = document.getElementById('billing-zone');
  if (!bZone) return;
  bZone.innerHTML = ''; // ล้างบิลเก่าค้างหน้าจอ

  if (!summary || summary.count === 0) return; // หากไม่มีเรียนเกิน ไม่ต้องขึ้นการ์ดเรียกเก็บเงิน

  let itemsHtml = '';
  summary.details.forEach(item => {
    itemsHtml += `
      <div class="bill-item">
        <span>• วันที่เรียน ${fmtDateTH(item.date)} (${item.type})</span>
        <span style="font-weight:600; color:var(--red);">+${item.rate} ฿</span>
      </div>
    `;
  });

  bZone.innerHTML = `
    <div class="billing-card" style="margin-bottom:14px;">
      <div class="card-title" style="color:var(--red); font-size:15px;">📋 สรุปรายการบิลค้างชำระ (เรียนเกินคอร์ส)</div>
      <div style="display:flex; flex-direction:column; gap:4px; margin:4px 0;">
        ${itemsHtml}
      </div>
      <div class="bill-total">
        <span>ยอดเงินรวมค้างชำระเพิ่ม:</span>
        <span style="color:var(--red); font-size:18px; font-weight:700;">${summary.totalAmount.toLocaleString()} บาท</span>
      </div>
    </div>
  `;
}

function renderHistoryLog(history) {
  const list = document.getElementById('att-list');
  if (!list) return;
  list.innerHTML = '';

  if (!history || history.length === 0) {
    list.innerHTML = `<div style="text-align:center; font-size:12px; color:var(--txt3); padding:20px 0;">ไม่มีประวัติการเช็คชื่อเข้าเรียน</div>`;
    return;
  }

  history.forEach(log => {
    const row = document.createElement('div');
    row.className = 'log-row';
    
    // แยกคลาสตามประเภท ติวสด / ออนไลน์ สไตล์เดิมของคุณป๊อป
    let typeClass = 'pill-live';
    if (log.type.includes('ออนไลน์') || log.type.toLowerCase().includes('online')) {
      typeClass = 'pill-online';
    }

    row.innerHTML = `
      <div class="log-meta">
        <span class="log-date">${fmtDateTH(log.date)}</span>
        <span class="log-round">รอบคอร์สที่: ${log.round || '—'}</span>
      </div>
      <span class="pill ${typeClass}">${log.type}</span>
    `;
    list.appendChild(row);
  });
}

function logout() {
  const pInput = document.getElementById('login-phone');
  if (pInput) pInput.value = '';
  
  const errBox = document.getElementById('login-err');
  if (errBox) errBox.classList.remove('show');
  
  document.getElementById('screen-main').style.display = 'none';
  document.getElementById('screen-login').style.display = 'flex';
  
  const logoutBtn = document.getElementById('btn-logout');
  if (logoutBtn) logoutBtn.classList.remove('show');
}

function fmtDateTH(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric' });
}
</script>

</body>
</html>
